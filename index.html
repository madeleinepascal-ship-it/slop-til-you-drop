<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SLOP 'TIL YOU DROP</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #0a0f2c;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      user-select: none;
    }

    /* ── Centered text stage ── */
    #stage {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 3rem 2rem 5rem;
      text-align: center;
      opacity: 1;
      transition: opacity 1.4s ease;
    }

    #tag {
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.22);
      margin-bottom: 1.4rem;
    }

    #text {
      font-size: clamp(1.25rem, 3vw, 2.1rem);
      line-height: 1.75;
      max-width: min(700px, 88vw);
      font-weight: 300;
    }

    /* ── Noise text ── */
    :root { --noise-url: none; }
    .noise-text {
      background-image: var(--noise-url);
      background-size: 100vw 100vh;
      background-attachment: fixed;
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ── Bottom controls ── */
    #controls {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 1.4rem;
      z-index: 10;
    }

    #controls button {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.25);
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      padding: 0.35rem 0.5rem;
      transition: color 0.25s;
      font-family: inherit;
    }
    #controls button:hover { color: rgba(255, 255, 255, 0.55); }
    #noise-btn.on { color: rgba(180, 210, 255, 0.55); }

    /* ── Splash ── */
    #splash {
      position: fixed; inset: 0; z-index: 20;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0a0f2c;
      pointer-events: none;
      animation: splashIn 1.2s ease forwards;
      transition: opacity 1.6s ease;
    }
    @keyframes splashIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    #splash h1 {
      font-size: clamp(2.2rem, 8vw, 6rem);
      font-weight: 800;
      letter-spacing: 0.06em;
      text-align: center;
      line-height: 1.05;
    }
    #splash p {
      margin-top: 1.1rem;
      font-size: clamp(0.65rem, 1.4vw, 0.9rem);
      color: rgba(255, 255, 255, 0.32);
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div id="splash">
  <h1 class="noise-text">SLOP&nbsp;'TIL<br>YOU&nbsp;DROP</h1>
  <p>drift into algorithmic slumber</p>
</div>

<div id="stage">
  <div id="tag"></div>
  <div id="text" class="noise-text"></div>
</div>

<div id="controls">
  <button id="pause-btn" onclick="togglePause()">&#9646;&#9646;</button>
  <button id="noise-btn" onclick="toggleNoise()">&#9654; noise</button>
</div>

<script>
// ── White noise texture ───────────────────────────────────────────────────────
(function () {
  const NW = 640, NH = 360;
  const nc   = document.createElement('canvas');
  nc.width   = NW; nc.height = NH;
  const nctx = nc.getContext('2d');
  const root = document.documentElement;

  function tick() {
    const id = nctx.createImageData(NW, NH);
    const d  = id.data;
    for (let i = 0; i < d.length; i += 4) {
      const v  = Math.random() * 255 | 0;
      d[i] = d[i+1] = d[i+2] = v;
      d[i+3] = 255;
    }
    nctx.putImageData(id, 0, 0);
    root.style.setProperty('--noise-url', `url('${nc.toDataURL()}')`);
  }

  tick();
  setInterval(tick, 80); // ~12 fps flicker
})();

// ── API sources ───────────────────────────────────────────────────────────────
const SOURCES = [
  {
    fetch: async () => {
      const d = await fetch('https://en.wikipedia.org/api/rest_v1/page/random/summary').then(r => r.json());
      const text = (d.extract || '').split('\n')[0].trim().slice(0, 450);
      return text.length > 40 ? [{ tag: 'WIKIPEDIA', text }] : [];
    }
  },
  {
    fetch: async () => {
      const d = await fetch('https://opentdb.com/api.php?amount=6&encode=url3986').then(r => r.json());
      if (d.response_code !== 0) return [];
      return d.results.map(q => ({
        tag: decodeURIComponent(q.category),
        text: decodeURIComponent(q.question)
      }));
    }
  },
  {
    fetch: async () => {
      const d = await fetch('https://api.adviceslip.com/advice', { cache: 'no-cache' }).then(r => r.json());
      return [{ tag: 'ADVICE', text: d.slip.advice }];
    }
  },
  {
    fetch: async () => {
      const d = await fetch('https://icanhazdadjoke.com/', { headers: { Accept: 'application/json' } }).then(r => r.json());
      return [{ tag: 'DAD JOKE', text: d.joke }];
    }
  },
  {
    fetch: async () => {
      const d = await fetch('https://uselessfacts.jsph.pl/api/v2/facts/random?language=en').then(r => r.json());
      return [{ tag: 'USELESS FACT', text: d.text }];
    }
  },
  {
    fetch: async () => {
      const d = await fetch('https://www.reddit.com/r/Showerthoughts/hot.json?limit=25&raw_json=1').then(r => r.json());
      return d.data.children
        .filter(c => !c.data.stickied && c.data.title.length > 20)
        .slice(0, 10)
        .map(c => ({ tag: 'SHOWER THOUGHT', text: c.data.title }));
    }
  },
  {
    fetch: async () => {
      const d = await fetch('https://www.reddit.com/r/todayilearned/hot.json?limit=25&raw_json=1').then(r => r.json());
      return d.data.children
        .filter(c => !c.data.stickied)
        .slice(0, 8)
        .map(c => ({ tag: 'TODAY I LEARNED', text: c.data.title.replace(/^TIL\s+that?\s*/i, '') }));
    }
  },
  {
    fetch: async () => {
      const d = await fetch('https://www.reddit.com/r/AskReddit/hot.json?limit=25&raw_json=1').then(r => r.json());
      return d.data.children
        .filter(c => !c.data.stickied && c.data.title.length > 20)
        .slice(0, 8)
        .map(c => ({ tag: 'ASK REDDIT', text: c.data.title }));
    }
  },
  {
    fetch: async () => {
      const ids = await fetch('https://hacker-news.firebaseio.com/v0/topstories.json').then(r => r.json());
      const picks = [...ids].sort(() => Math.random() - 0.5).slice(0, 6);
      const items = await Promise.all(
        picks.map(id => fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`).then(r => r.json()).catch(() => null))
      );
      return items.filter(i => i?.title).map(i => ({ tag: 'HACKER NEWS', text: i.title }));
    }
  }
];

// ── Queue ─────────────────────────────────────────────────────────────────────
let apiQueue  = [];
let fallback  = [];
let fallbackIdx = 0;
let fetching  = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

async function refill() {
  if (fetching || apiQueue.length > 6) return;
  fetching = true;
  const src = SOURCES[Math.floor(Math.random() * SOURCES.length)];
  try {
    const items = await src.fetch();
    apiQueue.push(...shuffle(items.filter(i => i.text?.trim().length > 10)));
  } catch (_) {}
  fetching = false;
}

function nextItem() {
  if (apiQueue.length < 4) refill();
  if (apiQueue.length > 0) return apiQueue.shift();
  if (fallbackIdx >= fallback.length) { fallback = shuffle(fallback); fallbackIdx = 0; }
  return fallback[fallbackIdx++];
}

// ── Display ───────────────────────────────────────────────────────────────────
const stage    = document.getElementById('stage');
const tagEl    = document.getElementById('tag');
const textEl   = document.getElementById('text');
const pauseBtn = document.getElementById('pause-btn');

let timer  = null;
let paused = false;

function show(item) {
  stage.style.opacity = '0';
  setTimeout(() => {
    tagEl.textContent  = item.tag;
    textEl.innerHTML   = item.text.replace(/\n/g, '<br>');
    stage.style.opacity = '1';
  }, 1400);
}

function advance() {
  show(nextItem());
  if (!paused) timer = setTimeout(advance, 12000);
}

function togglePause() {
  paused = !paused;
  if (paused) {
    clearTimeout(timer);
    pauseBtn.innerHTML = '&#9654;';
  } else {
    pauseBtn.innerHTML = '&#9646;&#9646;';
    timer = setTimeout(advance, 12000);
  }
}

// ── Splash ────────────────────────────────────────────────────────────────────
const splash = document.getElementById('splash');
setTimeout(() => {
  splash.style.opacity = '0';
  setTimeout(() => splash.remove(), 1600);
}, 2800);

// Prime API queue in parallel, then start display
for (let i = 0; i < 3; i++) {
  const src = SOURCES[Math.floor(Math.random() * SOURCES.length)];
  src.fetch()
    .then(items => apiQueue.push(...shuffle(items.filter(i => i.text?.trim().length > 10))))
    .catch(() => {});
}

// Load fallback corpus, kick off display
fetch('data/slop.json')
  .then(r => r.json())
  .then(data => { fallback = shuffle(data); advance(); });


// ── White noise ──────────────────────────────────────────────────────────────
let audioCtx = null, noiseNode = null, gainNode = null, noiseOn = false;

function buildNoise(ctx) {
  const sz  = ctx.sampleRate * 3;
  const buf = ctx.createBuffer(1, sz, ctx.sampleRate);
  const d   = buf.getChannelData(0);
  for (let i = 0; i < sz; i++) d[i] = Math.random() * 2 - 1;
  const src = ctx.createBufferSource();
  src.buffer = buf; src.loop = true;
  const f = ctx.createBiquadFilter();
  f.type = 'lowpass'; f.frequency.value = 800;
  src.connect(f);
  return { source: src, filter: f };
}

function toggleNoise() {
  const btn = document.getElementById('noise-btn');
  if (!noiseOn) {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      gainNode = audioCtx.createGain();
      gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
      gainNode.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const { source, filter } = buildNoise(audioCtx);
    filter.connect(gainNode);
    source.start();
    noiseNode = source;
    gainNode.gain.linearRampToValueAtTime(0.18, audioCtx.currentTime + 1.5);
    noiseOn = true;
    btn.classList.add('on');
    btn.innerHTML = '&#9646;&#9646; noise';
  } else {
    gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.2);
    setTimeout(() => { if (noiseNode) { noiseNode.stop(); noiseNode = null; } }, 1400);
    noiseOn = false;
    btn.classList.remove('on');
    btn.innerHTML = '&#9654; noise';
  }
}
</script>
</body>
</html>
