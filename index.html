// ── Starfield ──────────────────────────────────────────────────────────────
(function () {
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let W, H, stars = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function makeStars() {
    stars = [];
    const count = Math.floor((W * H) / 3000);
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.4 + 0.2,
        base: Math.random() * 0.7 + 0.1,
        phase: Math.random() * Math.PI * 2,
        speed: Math.random() * 0.4 + 0.1,
      });
    }
  }

  let t = 0;
  function draw() {
    ctx.clearRect(0, 0, W, H);

    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0,   '#08091a');
    grad.addColorStop(0.5, '#0a0e1a');
    grad.addColorStop(1,   '#0c1128');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    t += 0.012;
    for (const s of stars) {
      const op = s.base * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${op.toFixed(3)})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); makeStars(); });
  resize(); makeStars(); draw();

  // Shooting stars
  function shoot() {
    const el = document.createElement('div');
    el.className = 'shoot';
    const startX = Math.random() * W * 1.2;
    const startY = Math.random() * H * 0.5;
    const angle  = (Math.random() * 30 + 15) * (Math.PI / 180);
    const dist   = 300 + Math.random() * 400;
    el.style.left = startX + 'px';
    el.style.top  = startY + 'px';
    el.style.setProperty('--sx', Math.round(Math.cos(angle) * dist));
    el.style.setProperty('--sy', Math.round(Math.sin(angle) * dist));
    const dur = 0.6 + Math.random() * 0.8;
    el.style.setProperty('--sdur', dur + 's');
    document.body.appendChild(el);
    setTimeout(() => el.remove(), dur * 1000 + 200);
  }
  function scheduleShoot() {
    shoot();
    setTimeout(scheduleShoot, 4000 + Math.random() * 12000);
  }
  setTimeout(scheduleShoot, 2000);
})();

// ── Floating slop ──────────────────────────────────────────────────────────
let slopIndex = 0;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let shuffled = shuffle(SLOP);

function nextSlop() {
  if (slopIndex >= shuffled.length) {
    shuffled = shuffle(SLOP);
    slopIndex = 0;
  }
  return shuffled[slopIndex++];
}

function spawnSlop() {
  const item = nextSlop();
  const el = document.createElement('div');
  el.className = 'slop';

  const blobW = Math.min(420, window.innerWidth * 0.88);

}

// ── White Noise (Web Audio API) ────────────────────────────────────────────
let audioCtx = null;
let noiseNode = null;
let gainNode  = null;
let noiseOn   = false;

function buildNoise(ctx) {
  const bufferSize = ctx.sampleRate * 3;
  const buffer     = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data       = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

  const source  = ctx.createBufferSource();
  source.buffer = buffer;
  source.loop   = true;

  const filter = ctx.createBiquadFilter();
  filter.type  = 'lowpass';
  filter.frequency.value = 800;

  source.connect(filter);
  return { source, filter };
}

function toggleNoise() {
  const btn = document.getElementById('noise-btn');
  if (!noiseOn) {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      gainNode  = audioCtx.createGain();
      gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
      gainNode.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();

    const { source, filter } = buildNoise(audioCtx);
    filter.connect(gainNode);
    source.start();
    noiseNode = source;

    gainNode.gain.linearRampToValueAtTime(0.18, audioCtx.currentTime + 1.5);

    noiseOn = true;
    btn.textContent = '◼ white noise';
    btn.classList.add('on');
  } else {
    gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.2);
    setTimeout(() => { if (noiseNode) { noiseNode.stop(); noiseNode = null; } }, 1400);
    noiseOn = false;
    btn.textContent = '▶ white noise';
    btn.classList.remove('on');
  }
}
</script>
</body>
</html>
