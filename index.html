<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SLOP 'TIL YOU DROP</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #0a0f2c;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      user-select: none;
    }

    /* ── Noise text ── */
    :root { --noise-url: none; }
    .noise-text {
      background-image: var(--noise-url);
      background-size: 100vw 100vh;
      background-attachment: fixed;
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ── Splash ── */
    #splash {
      position: fixed; inset: 0; z-index: 20;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0a0f2c;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.5s ease;
    }
    #title {
      font-weight: 800;
      letter-spacing: -0.02em;
      text-align: center;
      line-height: 0.93;
      /* font-size set by JS */
    }
    #subhead {
      margin-top: 1.8rem;
      font-size: clamp(0.85rem, 1.8vw, 1.2rem);
      color: rgba(255, 255, 255, 0.38);
      letter-spacing: 0.03em;
      opacity: 0;
      transition: opacity 0.5s ease;
      min-height: 1.6em;
    }

    /* ── Scrolling feed ── */
    #feed {
      position: fixed; inset: 0; z-index: 5;
      overflow: hidden;
      pointer-events: none;
    }
    .slop-item {
      position: absolute;
      color: rgba(255, 255, 255, 0.72);
      font-size: clamp(0.68rem, 1.2vw, 0.84rem);
      line-height: 1.78;
      font-weight: 300;
      animation: riseUp var(--dur, 16s) linear forwards;
      will-change: transform, opacity;
    }
    .item-tag {
      display: block;
      font-size: 0.5rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.22);
      margin-bottom: 0.35rem;
    }
    @keyframes riseUp {
      0%   { opacity: 0; transform: translateY(0); }
      6%   { opacity: 1; }
      88%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(calc(-100vh - 500px)); }
    }

    /* ── Controls ── */
    #controls {
      position: fixed; bottom: 2.5rem; left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; gap: 0.65rem;
      pointer-events: none;
    }
    #noise-label {
      font-size: 0.68rem;
      color: rgba(255, 255, 255, 0.28);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    #noise-btn {
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.6);
      padding: 0.8rem 2.4rem;
      border-radius: 99px;
      font-size: 1.05rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      pointer-events: all;
    }
    #noise-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
    #noise-btn.on { color: #fff; border-color: rgba(255,255,255,0.45); }
    #pause-btn {
      background: none; border: none;
      color: rgba(255,255,255,0.18);
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.2s;
      pointer-events: all;
      padding: 0.2rem 0.4rem;
    }
    #pause-btn:hover { color: rgba(255,255,255,0.45); }
  </style>
</head>
<body>

<div id="splash">
  <h1 id="title" class="noise-text">SLOP&nbsp;'TIL<br>YOU&nbsp;DROP</h1>
  <p id="subhead"></p>
</div>

<div id="feed"></div>

<div id="controls">
  <div id="noise-label">put on white noise for the full experience</div>
  <button id="noise-btn" onclick="toggleNoise()">&#9654;&nbsp;&nbsp;white noise</button>
  <button id="pause-btn" onclick="togglePause()">&#9646;&#9646;&nbsp;pause</button>
</div>

<script>
// ── Noise texture ─────────────────────────────────────────────────────────────
(function () {
  const NW = 640, NH = 360;
  const nc = document.createElement('canvas');
  nc.width = NW; nc.height = NH;
  const nctx = nc.getContext('2d');

  function tick() {
    const id = nctx.createImageData(NW, NH);
    const d  = id.data;
    for (let i = 0; i < d.length; i += 4) {
      const v = Math.random() * 255 | 0;
      d[i] = d[i+1] = d[i+2] = v;
      d[i+3] = 255;
    }
    nctx.putImageData(id, 0, 0);
    document.documentElement.style.setProperty('--noise-url', `url('${nc.toDataURL()}')`);
  }
  tick();
  setInterval(tick, 80);
})();

// ── Fit title to screen width ─────────────────────────────────────────────────
function fitTitle() {
  const lines = ["SLOP 'TIL", "YOU DROP"];
  const tc = document.createElement('canvas').getContext('2d');
  const target = window.innerWidth * 0.97;
  let size = 10;
  while (size < 800) {
    tc.font = `800 ${size + 4}px system-ui, -apple-system, sans-serif`;
    if (Math.max(...lines.map(l => tc.measureText(l).width)) > target) break;
    size += 4;
  }
  document.getElementById('title').style.fontSize = size + 'px';
}
fitTitle();
window.addEventListener('resize', fitTitle);

// ── Splash + sequential subheads ──────────────────────────────────────────────
const SUBHEADS = [
  "use all the boring for something useful,",
  "like drifting into an algorithmic slumber,",
  "after all you can't spell napping without AI"
];
const splash  = document.getElementById('splash');
const subEl   = document.getElementById('subhead');

// Fade splash in
requestAnimationFrame(() => requestAnimationFrame(() => { splash.style.opacity = '1'; }));

function showSubhead(text) {
  subEl.style.opacity = '0';
  setTimeout(() => { subEl.textContent = text; subEl.style.opacity = '1'; }, 500);
}

setTimeout(() => showSubhead(SUBHEADS[0]), 1000);
setTimeout(() => showSubhead(SUBHEADS[1]), 2800);
setTimeout(() => showSubhead(SUBHEADS[2]), 4600);

// Fade splash out after all three shown
setTimeout(() => {
  splash.style.opacity = '0';
  setTimeout(() => splash.remove(), 1500);
}, 7000);

// ── API sources ───────────────────────────────────────────────────────────────
const SOURCES = [
  {
    fetch: async () => {
      const d = await fetch('https://en.wikipedia.org/api/rest_v1/page/random/summary').then(r => r.json());
      const text = (d.extract || '').split('\n')[0].trim().slice(0, 380);
      return text.length > 40 ? [{ tag: 'WIKIPEDIA', text }] : [];
    }
  },
  {
    fetch: async () => {
      const d = await fetch('https://opentdb.com/api.php?amount=6&encode=url3986').then(r => r.json());
      if (d.response_code !== 0) return [];
      return d.results.map(q => ({
        tag: decodeURIComponent(q.category),
        text: decodeURIComponent(q.question)
      }));
    }
  },
  {
    fetch: async () => {
      const d = await fetch('https://api.adviceslip.com/advice', { cache: 'no-cache' }).then(r => r.json());
      return [{ tag: 'ADVICE', text: d.slip.advice }];
    }
  },
  {
    fetch: async () => {
      const d = await fetch('https://icanhazdadjoke.com/', { headers: { Accept: 'application/json' } }).then(r => r.json());
      return [{ tag: 'DAD JOKE', text: d.joke }];
    }
  },
  {
    fetch: async () => {
      const d = await fetch('https://uselessfacts.jsph.pl/api/v2/facts/random?language=en').then(r => r.json());
      return [{ tag: 'USELESS FACT', text: d.text }];
    }
  },
  {
    fetch: async () => {
      const d = await fetch('https://www.reddit.com/r/Showerthoughts/hot.json?limit=25&raw_json=1').then(r => r.json());
      return d.data.children
        .filter(c => !c.data.stickied && c.data.title.length > 20)
        .slice(0, 10)
        .map(c => ({ tag: 'SHOWER THOUGHT', text: c.data.title }));
    }
  },
  {
    fetch: async () => {
      const d = await fetch('https://www.reddit.com/r/todayilearned/hot.json?limit=25&raw_json=1').then(r => r.json());
      return d.data.children
        .filter(c => !c.data.stickied)
        .slice(0, 8)
        .map(c => ({ tag: 'TODAY I LEARNED', text: c.data.title.replace(/^TIL\s+that?\s*/i, '') }));
    }
  },
  {
    fetch: async () => {
      const d = await fetch('https://www.reddit.com/r/AskReddit/hot.json?limit=25&raw_json=1').then(r => r.json());
      return d.data.children
        .filter(c => !c.data.stickied && c.data.title.length > 20)
        .slice(0, 8)
        .map(c => ({ tag: 'ASK REDDIT', text: c.data.title }));
    }
  },
  {
    fetch: async () => {
      const ids = await fetch('https://hacker-news.firebaseio.com/v0/topstories.json').then(r => r.json());
      const picks = [...ids].sort(() => Math.random() - 0.5).slice(0, 6);
      const items = await Promise.all(
        picks.map(id => fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`).then(r => r.json()).catch(() => null))
      );
      return items.filter(i => i?.title).map(i => ({ tag: 'HACKER NEWS', text: i.title }));
    }
  }
];

// ── Queue ─────────────────────────────────────────────────────────────────────
let apiQueue  = [];
let fallback  = [];
let fallbackIdx = 0;
let fetching  = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

async function refill() {
  if (fetching || apiQueue.length > 10) return;
  fetching = true;
  const src = SOURCES[Math.floor(Math.random() * SOURCES.length)];
  try {
    const items = await src.fetch();
    apiQueue.push(...shuffle(items.filter(i => i.text?.trim().length > 10)));
  } catch (_) {}
  fetching = false;
}

function nextItem() {
  if (apiQueue.length < 6) refill();
  if (apiQueue.length > 0) return apiQueue.shift();
  if (fallbackIdx >= fallback.length) { fallback = shuffle(fallback); fallbackIdx = 0; }
  return fallback[fallbackIdx++] || { tag: '···', text: '···' };
}

// Pre-fetch aggressively while splash shows
for (let i = 0; i < 5; i++) {
  const src = SOURCES[Math.floor(Math.random() * SOURCES.length)];
  src.fetch()
    .then(items => apiQueue.push(...shuffle(items.filter(i => i.text?.trim().length > 10))))
    .catch(() => {});
}

fetch('data/slop.json').then(r => r.json()).then(data => { fallback = shuffle(data); });

// ── Feed ──────────────────────────────────────────────────────────────────────
const feed     = document.getElementById('feed');
let paused     = false;
const pauseBtn = document.getElementById('pause-btn');

function spawnItem(startY) {
  const item = nextItem();
  const el   = document.createElement('div');
  el.className = 'slop-item';

  const maxW = 220 + Math.random() * 160;
  const x    = 20 + Math.random() * Math.max(0, window.innerWidth - maxW - 40);
  const y    = startY !== undefined ? startY : window.innerHeight + 10;
  const dur  = 10 + Math.random() * 8;

  el.style.cssText = `left:${x}px;top:${y}px;max-width:${maxW}px`;
  el.style.setProperty('--dur', dur + 's');
  if (paused) el.style.animationPlayState = 'paused';

  el.innerHTML = `<span class="item-tag">${item.tag}</span>${item.text.replace(/\n/g, '<br>')}`;
  feed.appendChild(el);
  setTimeout(() => el.remove(), (dur + 0.5) * 1000);
}

function togglePause() {
  paused = !paused;
  feed.querySelectorAll('.slop-item').forEach(el => {
    el.style.animationPlayState = paused ? 'paused' : 'running';
  });
  pauseBtn.innerHTML = paused ? '&#9654;&nbsp;resume' : '&#9646;&#9646;&nbsp;pause';
}

// Start slop just as splash begins fading — burst fills whole screen, then steady stream
setTimeout(() => {
  // Initial burst spread across full viewport
  const INIT = 24;
  for (let i = 0; i < INIT; i++) {
    setTimeout(() => spawnItem(Math.random() * window.innerHeight * 1.1), i * 120);
  }

  // Fast ongoing stream from bottom
  let spawnDelay = INIT * 120 + 200;
  (function scheduleSpawn() {
    if (!paused) spawnItem();
    setTimeout(scheduleSpawn, 850 + Math.random() * 550);
  }());
}, 6500);

// ── White noise audio ─────────────────────────────────────────────────────────
let audioCtx = null, noiseNode = null, gainNode = null, noiseOn = false;

function buildNoise(ctx) {
  const sz  = ctx.sampleRate * 3;
  const buf = ctx.createBuffer(1, sz, ctx.sampleRate);
  const d   = buf.getChannelData(0);
  for (let i = 0; i < sz; i++) d[i] = Math.random() * 2 - 1;
  const src = ctx.createBufferSource();
  src.buffer = buf; src.loop = true;
  const f = ctx.createBiquadFilter();
  f.type = 'lowpass'; f.frequency.value = 800;
  src.connect(f);
  return { source: src, filter: f };
}

function toggleNoise() {
  const btn = document.getElementById('noise-btn');
  if (!noiseOn) {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      gainNode = audioCtx.createGain();
      gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
      gainNode.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const { source, filter } = buildNoise(audioCtx);
    filter.connect(gainNode);
    source.start();
    noiseNode = source;
    gainNode.gain.linearRampToValueAtTime(0.18, audioCtx.currentTime + 1.5);
    noiseOn = true;
    btn.classList.add('on');
    btn.innerHTML = '&#9646;&#9646;&nbsp;&nbsp;white noise';
  } else {
    gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.2);
    setTimeout(() => { if (noiseNode) { noiseNode.stop(); noiseNode = null; } }, 1400);
    noiseOn = false;
    btn.classList.remove('on');
    btn.innerHTML = '&#9654;&nbsp;&nbsp;white noise';
  }
}
</script>
</body>
</html>
