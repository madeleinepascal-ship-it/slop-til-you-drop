<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SLOP 'TIL YOU DROP</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #0a0f2c;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      user-select: none;
    }

    /* ── Centered text stage ── */
    #stage {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 3rem 2rem 5rem;
      text-align: center;
      opacity: 1;
      transition: opacity 1.4s ease;
    }

    #tag {
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.22);
      margin-bottom: 1.4rem;
    }

    #text {
      font-size: clamp(1.25rem, 3vw, 2.1rem);
      line-height: 1.75;
      color: #fff;
      max-width: min(700px, 88vw);
      font-weight: 300;
    }

    /* ── Bottom controls ── */
    #controls {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 1.4rem;
      z-index: 10;
    }

    #controls button {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.25);
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      padding: 0.35rem 0.5rem;
      transition: color 0.25s;
      font-family: inherit;
    }
    #controls button:hover { color: rgba(255, 255, 255, 0.55); }
    #noise-btn.on { color: rgba(180, 210, 255, 0.55); }

    /* ── Splash ── */
    #splash {
      position: fixed; inset: 0; z-index: 20;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0a0f2c;
      pointer-events: none;
      animation: splashIn 1.2s ease forwards;
      transition: opacity 1.6s ease;
    }
    @keyframes splashIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    #splash h1 {
      font-size: clamp(2.2rem, 8vw, 6rem);
      font-weight: 800;
      letter-spacing: 0.06em;
      color: #fff;
      text-align: center;
      line-height: 1.05;
    }
    #splash p {
      margin-top: 1.1rem;
      font-size: clamp(0.65rem, 1.4vw, 0.9rem);
      color: rgba(255, 255, 255, 0.32);
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div id="splash">
  <h1>SLOP&nbsp;'TIL<br>YOU&nbsp;DROP</h1>
  <p>drift into algorithmic slumber</p>
</div>

<div id="stage">
  <div id="tag"></div>
  <div id="text"></div>
</div>

<div id="controls">
  <button id="pause-btn" onclick="togglePause()">&#9646;&#9646;</button>
  <button id="noise-btn" onclick="toggleNoise()">&#9654; noise</button>
</div>

<script>
// ── Slop display ─────────────────────────────────────────────────────────────
const stage   = document.getElementById('stage');
const tagEl   = document.getElementById('tag');
const textEl  = document.getElementById('text');
const pauseBtn = document.getElementById('pause-btn');

let items  = [];
let idx    = 0;
let timer  = null;
let paused = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function nextItem() {
  if (idx >= items.length) { items = shuffle(items); idx = 0; }
  return items[idx++];
}

function show(item) {
  stage.style.opacity = '0';
  setTimeout(() => {
    tagEl.textContent   = item.tag;
    textEl.innerHTML    = item.text.replace(/\n/g, '<br>');
    stage.style.opacity = '1';
  }, 1400);
}

function advance() {
  show(nextItem());
  if (!paused) timer = setTimeout(advance, 12000);
}

function togglePause() {
  paused = !paused;
  if (paused) {
    clearTimeout(timer);
    pauseBtn.innerHTML = '&#9654;';
  } else {
    pauseBtn.innerHTML = '&#9646;&#9646;';
    timer = setTimeout(advance, 12000);
  }
}

// ── Splash ───────────────────────────────────────────────────────────────────
const splash = document.getElementById('splash');
setTimeout(() => {
  splash.style.opacity = '0';
  setTimeout(() => splash.remove(), 1600);
}, 2800);

fetch('data/slop.json')
  .then(r => r.json())
  .then(data => { items = shuffle(data); advance(); });


// ── White noise ──────────────────────────────────────────────────────────────
let audioCtx = null, noiseNode = null, gainNode = null, noiseOn = false;

function buildNoise(ctx) {
  const sz  = ctx.sampleRate * 3;
  const buf = ctx.createBuffer(1, sz, ctx.sampleRate);
  const d   = buf.getChannelData(0);
  for (let i = 0; i < sz; i++) d[i] = Math.random() * 2 - 1;
  const src = ctx.createBufferSource();
  src.buffer = buf; src.loop = true;
  const f = ctx.createBiquadFilter();
  f.type = 'lowpass'; f.frequency.value = 800;
  src.connect(f);
  return { source: src, filter: f };
}

function toggleNoise() {
  const btn = document.getElementById('noise-btn');
  if (!noiseOn) {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      gainNode = audioCtx.createGain();
      gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
      gainNode.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const { source, filter } = buildNoise(audioCtx);
    filter.connect(gainNode);
    source.start();
    noiseNode = source;
    gainNode.gain.linearRampToValueAtTime(0.18, audioCtx.currentTime + 1.5);
    noiseOn = true;
    btn.classList.add('on');
    btn.innerHTML = '&#9646;&#9646; noise';
  } else {
    gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.2);
    setTimeout(() => { if (noiseNode) { noiseNode.stop(); noiseNode = null; } }, 1400);
    noiseOn = false;
    btn.classList.remove('on');
    btn.innerHTML = '&#9654; noise';
  }
}
</script>
</body>
</html>
